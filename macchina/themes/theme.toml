spacing            = 1
padding            = 0
hide_ascii         = false
separator          = ">>="
key_color          = "#ef3985"
separator_color    = "#9ca4f7"

[custom_ascii]
path  = "~/.config/macchina/logo.txt"
color = "blue"

[palette]
type = "Full"
visible = true
glyph = "* "

[bar]
glyph           = "*"
symbol_open     = '['
symbol_close    = ']'
hide_delimiters = false
visible         = true

[box]
border          = "plain"
visible         = false

[box.inner_margin]
x               = 2
y               = 0

[randomize]
key_color       = false
separator_color = false

[keys]
host            = "Host"
kernel          = "Kernel"
battery         = "Battery"
os              = "OS"
de              = "DE"
wm              = "WM"
distro          = "Distro"
terminal        = "Terminal"
shell           = "Shell"
packages        = "Packages"
uptime          = "Uptime"
memory          = "Memory"
machine         = "Machine"
local_ip        = "Local IP"
backlight       = "Brightness"
resolution      = "Resolution"
cpu             = "CPU"
cpu_load        = "CPU Load"
